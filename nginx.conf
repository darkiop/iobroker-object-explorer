server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; connect-src 'self' http: https: ws: wss:; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self';" always;

    # SPA-Fallback (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /config.js {
        add_header Cache-Control "no-store" always;
    }

    # API-Proxy zu ioBroker (entspricht dem Vite-Proxy)
    location /api/ {
        proxy_pass http://${IOBROKER_HOST}:${IOBROKER_PORT}/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Long polling: disable buffering so events reach the client immediately,
        # and raise read timeout above the 30s polling interval.
        proxy_buffering off;
        proxy_read_timeout 60s;
    }

    # Socket.IO proxy — routes WebSocket + polling through nginx so port 8084
    # does not need to be directly reachable from the browser.
    location /socket.io/ {
        proxy_pass http://${IOBROKER_HOST}:${SOCKETIO_PORT}/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
    }
}
